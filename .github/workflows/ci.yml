name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Check repository structure
        run: |
          echo 'No standard package manifest found (package.json or pyproject.toml)'
          echo 'Please add one, then update this workflow to use the appropriate reusable workflow:'
          echo '  Node: 0x-wzw/ci-cd-templates/.github/workflows/node-standard.yml@main'
          echo '  Python: 0x-wzw/ci-cd-templates/.github/workflows/python-standard.yml@main'

